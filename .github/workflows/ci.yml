name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded in-flight runs on the same ref (feature branch / PR) when a
# new push arrives, to cut CI minutes — but NEVER cancel runs on `main` so every
# push to the default branch always gets a full, complete validation.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  # Enforce the AGENTS.md "0 warnings" rule compiler-wide: any warning is an error.
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      # --all-targets covers unit + integration tests and compiles every crate;
      # it skips doctests, so run those separately.
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  doc:
    name: doc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  build-release:
    name: build-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin wxd --bin wxd-config
      - uses: actions/upload-artifact@v4
        with:
          name: wxd-binaries-${{ github.sha }}
          path: |
            target/release/wxd
            target/release/wxd-config
          if-no-files-found: error
